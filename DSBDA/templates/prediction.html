{% extends "layout.html" %}

{% block page_title %}Sales Prediction Engine{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="chart-container">
            <h5 class="fw-bold mb-4">Input Parameters</h5>
            <form id="predictionForm">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Region</label>
                    <select class="form-select" id="regionInput" required>
                        <option value="West">West</option>
                        <option value="East">East</option>
                        <option value="Central">Central</option>
                        <option value="South">South</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Category</label>
                    <select class="form-select" id="categoryInput" required>
                        <option value="Furniture">Furniture</option>
                        <option value="Office Supplies">Office Supplies</option>
                        <option value="Technology">Technology</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">Previous Sales Value ($)</label>
                    <input type="number" step="0.01" class="form-control" id="salesInput" required placeholder="e.g., 500.00">
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100"><i class="fas fa-magic me-2"></i> Generate Prediction</button>
            </form>
        </div>
    </div>
    <div class="col-md-6">
        <div class="kpi-card p-5 h-100 d-flex flex-column justify-content-center align-items-center text-center">
            <h5 class="text-muted text-uppercase fw-bold mb-4">Predicted Sales Result</h5>
            <div id="predictionResult" style="display: none;">
                <h1 class="display-3 fw-bold text-success mb-3" id="predictedValue">$0.00</h1>
                <p class="text-muted">Expected sales based on selected parameters</p>
                <div class="mt-4 pt-4 border-top">
                    <button class="btn btn-outline-primary" onclick="window.print()"><i class="fas fa-download me-2"></i> Export Report</button>
                </div>
            </div>
            <div id="predictionPlaceholder">
                <i class="fas fa-chart-line fa-4x text-muted mb-3 opacity-25"></i>
                <p class="text-muted">Fill out the form and click Predict to see results</p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('predictionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const region = document.getElementById('regionInput').value;
    const category = document.getElementById('categoryInput').value;
    const salesValue = document.getElementById('salesInput').value;

    fetch('/predict_sales', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            region: region,
            category: category,
            sales_value: salesValue
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('predictionPlaceholder').style.display = 'none';
        document.getElementById('predictionResult').style.display = 'block';
        document.getElementById('predictedValue').innerText = '$' + parseFloat(data.predicted_sales).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    })
    .catch((error) => {
        console.error('Error:', error);
        alert("An error occurred during prediction.");
    });
});
</script>
{% endblock %}
